<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CALCULATOR</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="main">
    <div id="name">
      <p>CALCULATOR</p>
    </div>
    <div id="display"></div>
    <div id="buttons">
      <div id="one"class="button">
        <h1>1</h1>
      </div>
      <div id="two"class="button">
        <h1>2</h1>
      </div>
      <div id="three"class="button">
        <h1>3</h1>
      </div>
      <div id="four"class="button">
        <h1>4</h1>
      </div>
      
      <div id="five"class="button"><h1>5</h1></div>
      <div id="six"class="button"><h1>6</h1></div>
      <div id="seven"class="button"><h1>7</h1></div>
      <div id="eight"class="button"><h1>8</h1></div>
      <div id="nine"class="button"><h1>9</h1></div>
      <div id="zero"class="button"><h1>0</h1></div>
      <div id="plus"class="button"><h1>+</h1></div>
      <div id="minus"class="button"><h1>-</h1></div>
      <div id="multiply"class="button"><h1>*</h1></div>
      <div id="divide"class="button"><h1>/</h1></div>
      <button class="button">AC</button>
      <div id="equal"class="button"><h1>=</h1></div>
      
      
    </div>

  </div>
  
  <script src="script.js"></script>
</body>
</html>
